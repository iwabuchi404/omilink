name: Build and Deploy
on:
  push:
    branches: [ release ] 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
      - name: Deploy to GCE
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: deploy
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          # pb_public だけでなく、マイグレーションとフックも同期対象に含めます
          source: "pocketbase/pb_public/*,pocketbase/pb_migrations/*,pocketbase/pb_hooks/*"
          target: "/opt/omilink/"
          strip_components: 0
      - name: Restart PocketBase
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: deploy
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          # 再起動時にマイグレーションが自動適用されます
          script: sudo systemctl restart pocketbase